<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">NearNow banner</title>
  <desc id="desc">NearNow brand banner with a Gulf Coast map, alert pins, and the words live local intelligence.</desc>
  <defs>
