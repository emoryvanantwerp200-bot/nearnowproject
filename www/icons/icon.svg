<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0E14"/>
      <stop offset="100%" style="stop-color:#151A25"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00F5D4"/>
      <stop offset="100%" style="stop-color:#00B899"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="0" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="240" r="150" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.2"/>
  <circle cx="256" cy="240" r="105" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.35"/>
  <!-- Center dot -->
  <circle cx="256" cy="240" r="55" fill="url(#accent)" opacity="0.15"/>
  <circle cx="256" cy="240" r="24" fill="url(#accent)"/>
  <!-- Pulse arcs -->
  <path d="M 200 175 A 80 80 0 0 1 312 175" fill="none" stroke="#00F5D4" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M 180 155 A 110 110 0 0 1 332 155" fill="none" stroke="#00F5D4" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <path d="M 165 140 A 135 135 0 0 1 347 140" fill="none" stroke="#00F5D4" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>
  <!-- Pin drop below -->
  <path d="M 256 275 L 256 330" stroke="#00F5D4" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <circle cx="256" cy="340" r="6" fill="#00F5D4" opacity="0.5"/>
  <!-- Text -->
  <text x="256" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="56" fill="#E8ECF2" letter-spacing="5">NEAR</text>
  <text x="256" y="468" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="40" fill="#00F5D4" letter-spacing="8">NOW</text>
</svg>