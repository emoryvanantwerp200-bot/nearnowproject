<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0E14"/>
      <stop offset="100%" style="stop-color:#151A25"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00F5D4"/>
      <stop offset="100%" style="stop-color:#00B899"/>
    </linearGradient>
  </defs>
  <!-- Background with maskable safe zone padding -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Everything scaled to fit within 80% safe zone (centered in 409.6x409.6 area) -->
  <g transform="translate(51.2, 51.2) scale(0.8)">
    <!-- Outer ring -->
    <circle cx="256" cy="230" r="130" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.2"/>
    <circle cx="256" cy="230" r="90" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.35"/>
    <!-- Center dot -->
    <circle cx="256" cy="230" r="48" fill="url(#accent)" opacity="0.15"/>
    <circle cx="256" cy="230" r="22" fill="url(#accent)"/>
    <!-- Pulse arcs -->
    <path d="M 206 172 A 70 70 0 0 1 306 172" fill="none" stroke="#00F5D4" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <path d="M 188 155 A 98 98 0 0 1 324 155" fill="none" stroke="#00F5D4" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
    <!-- Pin drop -->
    <path d="M 256 268 L 256 310" stroke="#00F5D4" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <circle cx="256" cy="320" r="5" fill="#00F5D4" opacity="0.5"/>
    <!-- Text -->
    <text x="256" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="50" fill="#E8ECF2" letter-spacing="4">NEAR</text>
    <text x="256" y="444" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="36" fill="#00F5D4" letter-spacing="7">NOW</text>
  </g>
</svg>